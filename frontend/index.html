<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadelNet</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;--text:#e8eaf6;--muted:#8892b0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:500;transition:all .2s}
input,textarea,select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:14px;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#fff}.btn:hover{opacity:.85}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;position:absolute;top:-4px;right:-6px}
#auth-section{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;width:100%;max-width:400px}
.auth-box h1{font-size:28px;font-weight:700;margin-bottom:4px}
.auth-box p.sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);padding:4px;border-radius:8px}
.auth-tabs button{flex:1;background:none;color:var(--muted);border-radius:6px;padding:8px}
.auth-tabs button.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;display:none}
#app-section{display:none;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100}
header .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
nav{display:flex;gap:4px;flex:1;overflow-x:auto;padding:8px 0}
nav button{background:none;color:var(--muted);white-space:nowrap;border-radius:6px;padding:6px 12px}
nav button.active,nav button:hover{background:var(--card);color:var(--text)}
.header-actions{display:flex;align-items:center;gap:12px;flex-shrink:0}
.bell-btn{position:relative;background:var(--card);color:var(--text);border-radius:8px;padding:8px 12px;font-size:16px;border:1px solid var(--border)}
.user-info{font-size:13px;color:var(--muted);white-space:nowrap}
.user-info span{color:var(--accent);font-weight:600}
.logout-btn{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:13px}
main{padding:24px;max-width:1200px;margin:0 auto}
.page-title{font-size:22px;font-weight:700;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover{background:var(--card);cursor:pointer}
.status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:500}
.status-pending_proposal,.status-pending{background:rgba(243,156,18,.15);color:var(--orange)}
.status-proposed,.status-open{background:rgba(124,92,252,.15);color:var(--accent2)}
.status-scheduled,.status-accepted{background:rgba(79,142,247,.15);color:var(--accent)}
.status-in_progress{background:rgba(46,204,113,.15);color:var(--green)}
.status-completed,.status-paid,.status-resolved{background:rgba(46,204,113,.15);color:var(--green)}
.status-cancelled,.status-rejected,.status-overdue{background:rgba(231,76,60,.15);color:var(--red)}
.status-disputed{background:rgba(231,76,60,.2);color:var(--red);font-weight:700}
.status-countered{background:rgba(241,196,15,.15);color:var(--yellow)}
.status-player,.status-captain,.status-admin{background:rgba(79,142,247,.1);color:var(--accent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;border:1px solid var(--border)}
.stat-card .val{font-size:28px;font-weight:700;margin:4px 0}
.stat-card .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:760px;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:none;color:var(--muted);font-size:20px;padding:4px 8px;border-radius:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab-bar button{background:none;color:var(--muted);border-radius:0;padding:10px 14px;border-bottom:2px solid transparent;white-space:nowrap}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
.chat-box{height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--card)}
.chat-msg{display:flex;flex-direction:column;gap:2px;max-width:70%}
.chat-msg.mine{align-self:flex-end}
.chat-msg.mine .bubble{background:var(--accent);color:#fff;border-radius:12px 12px 2px 12px}
.chat-msg.theirs .bubble{background:var(--border);color:var(--text);border-radius:12px 12px 12px 2px}
.bubble{padding:8px 12px;font-size:14px;line-height:1.4}
.chat-meta{font-size:11px;color:var(--muted)}
.chat-input-row{display:flex;gap:8px;margin-top:12px}
.chat-input-row input{flex:1}
.week-block{margin-bottom:20px}
.week-block h3{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ach-grid{display:flex;flex-wrap:wrap;gap:10px}
.ach-badge{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px}
.ach-badge .icon{font-size:20px}
.ach-locked{opacity:.35}
.notif-panel{display:none;position:absolute;right:0;top:calc(100% + 8px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:380px;max-height:500px;overflow-y:auto;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.notif-panel.open{display:block}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px}
.notif-item:last-child{border-bottom:none}
.notif-item .notif-title{font-weight:600;margin-bottom:4px}
.notif-item .notif-sub{color:var(--muted);font-size:12px;margin-top:2px}
.notif-actions{display:flex;gap:8px;margin-top:8px}
.wall-post{border-left:3px solid var(--accent);padding:14px 16px;background:var(--card);border-radius:0 8px 8px 0;margin-bottom:12px}
.wall-post.pinned{border-color:var(--yellow)}
.wall-post.system{border-color:var(--green)}
.wall-post h3{font-size:15px;font-weight:600;margin-bottom:6px}
.wall-post p{font-size:13px;color:var(--muted);line-height:1.5}
.wall-post .meta{font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:12px;align-items:center}
.sponsors-bar{display:flex;gap:10px;padding:8px 0 16px;overflow-x:auto}
.sponsor-chip{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:13px;color:var(--muted);white-space:nowrap}
.rank-num{font-weight:700;font-size:16px;color:var(--accent);width:32px;display:inline-block}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1;margin-bottom:0}
.star-rating{display:flex;gap:4px;margin-top:4px}
.star-rating span{font-size:28px;cursor:pointer;color:var(--border);transition:color .15s;user-select:none}
.star-rating span.lit{color:var(--yellow)}
.bell-wrap{position:relative}
#onboarding-bg.show{display:flex!important}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-section">
  <div class="auth-box">
    <h1>PadelNet ⚡</h1>
    <p class="sub">Liga de pádel online</p>
    <div class="auth-tabs">
      <button id="tab-login" class="active" onclick="switchAuthTab('login')">Iniciar sesión</button>
      <button id="tab-register" onclick="switchAuthTab('register')">Registrarse</button>
    </div>
    <div id="form-login">
      <div class="form-group"><label>Email</label><input id="login-email" type="email" placeholder="tu@email.com"></div>
      <div class="form-group"><label>Contraseña</label><input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button>
      <p id="login-err" class="error-msg"></p>
    </div>
    <div id="form-register" style="display:none">
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group"><label>Nombre</label><input id="reg-first" placeholder="Nombre"></div>
        <div class="form-group"><label>Apellido</label><input id="reg-last" placeholder="Apellido"></div>
      </div>
      <div class="form-group"><label>Email</label><input id="reg-email" type="email" placeholder="tu@email.com"></div>
      <div class="form-group"><label>Contraseña</label><input id="reg-pass" type="password" placeholder="Mín. 8 caracteres"></div>
      <p style="font-size:12px;color:var(--muted);margin:8px 0">Los nuevos usuarios se registran como Jugador</p>
      <button class="btn" style="width:100%;margin-top:8px" onclick="doRegister()">Registrarse</button>
      <p id="reg-err" class="error-msg"></p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-section">
  <header>
    <div class="logo">⚡ PadelNet</div>
    <nav id="main-nav"></nav>
    <div class="header-actions">
      <div class="bell-wrap">
        <button class="bell-btn" onclick="toggleNotifPanel(event)">🔔<span id="notif-badge" class="badge" style="display:none">0</span></button>
        <div id="notif-panel" class="notif-panel">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;justify-content:space-between">
            <span>Notificaciones</span>
            <span id="notif-panel-badge" style="color:var(--red);font-size:12px"></span>
          </div>
          <div id="notif-content">Cargando...</div>
        </div>
      </div>
      <div class="user-info">Hola, <span id="header-name"></span></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <main id="main-content"></main>
</div>

<!-- ONBOARDING MODAL -->
<div id="onboarding-bg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:32px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:48px;margin-bottom:8px">🏓</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:6px">¡Completa tu perfil!</h2>
      <p style="color:var(--muted);font-size:14px">Cuéntanos un poco sobre ti para que tus compañeros de liga te conozcan mejor</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="text-align:center;margin-bottom:8px">
        <div id="ob-avatar-preview" style="width:90px;height:90px;border-radius:50%;background:var(--card);border:2px solid var(--border);margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px">👤</div>
        <div class="form-group" style="margin:0">
          <label>URL de foto de perfil</label>
          <input id="ob-photo" type="url" placeholder="https://…/tu-foto.jpg" oninput="previewAvatar(this.value)">
        </div>
      </div>

      <div class="form-group">
        <label>Nombre de usuario <span style="color:var(--muted);font-weight:400">(@handle)</span></label>
        <input id="ob-username" type="text" placeholder="ej. alexpadel92" maxlength="50">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nivel de juego</label>
          <select id="ob-level">
            <option value="">Selecciona…</option>
            <option value="iniciacion">Iniciación</option>
            <option value="intermedio">Intermedio</option>
            <option value="avanzado">Avanzado</option>
            <option value="competicion">Competición</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lado preferido</label>
          <select id="ob-side">
            <option value="">Selecciona…</option>
            <option value="drive">Drive (derecha)</option>
            <option value="reves">Revés (izquierda)</option>
            <option value="ambos">Me adapto</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Años jugando</label>
          <input id="ob-years" type="number" min="0" max="50" placeholder="0">
        </div>
        <div class="form-group">
          <label>Pista preferida</label>
          <select id="ob-court">
            <option value="">Selecciona…</option>
            <option value="indoor">Indoor (cristal)</option>
            <option value="outdoor">Outdoor</option>
            <option value="ambas">Ambas</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Teléfono <span style="color:var(--muted);font-weight:400">(opcional)</span></label>
        <input id="ob-phone" type="tel" placeholder="+34 600 000 000">
      </div>

      <div class="form-group">
        <label>Bio <span style="color:var(--muted);font-weight:400">(opcional, máx. 500 car.)</span></label>
        <textarea id="ob-bio" rows="3" maxlength="500" placeholder="Ej. Llevo 5 años jugando, busco mejorar el smash…" style="resize:vertical"></textarea>
      </div>

      <p id="ob-err" class="error-msg"></p>

      <button class="btn" style="width:100%;padding:12px;font-size:15px;margin-top:4px" onclick="saveOnboarding()">Guardar y empezar 🚀</button>
      <button onclick="skipOnboarding()" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px">Ahora no, completar más tarde</button>
    </div>
  </div>
</div>

<!-- MATCH DETAIL MODAL -->
<div id="match-modal-bg" class="modal-bg" onclick="if(event.target===this)closeMatchModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="match-modal-title">Partido</h2>
      <button class="modal-close" onclick="closeMatchModal()">✕</button>
    </div>
    <div class="modal-body" id="match-modal-body"></div>
  </div>
</div>

<!-- GENERIC DETAIL MODAL -->
<div id="detail-modal-bg" class="modal-bg" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detail-modal-title"></h2>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-modal-body"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  token: localStorage.getItem('token') || null,
  refreshToken: localStorage.getItem('refreshToken') || null,
  user: null,
  myTeam: null,
  activeSeasonId: null,
  currentView: 'wall',
  calendarMonth: null,
};
let chatPollRef = null;
let currentMatchId = null;
let notifPollRef = null;

// ============================================================
// API
// ============================================================
async function api(method, path, body, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (!noAuth && S.token) headers['Authorization'] = `Bearer ${S.token}`;
  const res = await fetch('/api' + path, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401 && !noAuth) {
    const ok = await tryRefresh();
    if (!ok) return {};
    return api(method, path, body, noAuth);
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function tryRefresh() {
  if (!S.refreshToken) { doLogout(); return false; }
  try {
    const r = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: S.refreshToken }),
    });
    const d = await r.json();
    if (d.tokens?.accessToken) {
      S.token = d.tokens.accessToken;
      localStorage.setItem('token', d.tokens.accessToken);
      return true;
    }
  } catch(e) {}
  doLogout();
  return false;
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  try {
    const d = await api('POST', '/auth/login', { email, password: pass }, true);
    S.token = d.tokens.accessToken;
    S.refreshToken = d.tokens.refreshToken;
    localStorage.setItem('token', d.tokens.accessToken);
    localStorage.setItem('refreshToken', d.tokens.refreshToken);
    await initApp();
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

async function doRegister() {
  const firstName = document.getElementById('reg-first').value;
  const lastName  = document.getElementById('reg-last').value;
  const email     = document.getElementById('reg-email').value;
  const password  = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-err');
  err.style.display = 'none';
  try {
    await api('POST', '/auth/register', { firstName, lastName, email, password }, true);
    document.getElementById('login-email').value = email;
    switchAuthTab('login');
    alert('Registro exitoso. Inicia sesión.');
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

function doLogout() {
  localStorage.removeItem('token');
  localStorage.removeItem('refreshToken');
  Object.assign(S, { token: null, refreshToken: null, user: null, myTeam: null, activeSeasonId: null });
  if (notifPollRef) { clearInterval(notifPollRef); notifPollRef = null; }
  document.getElementById('auth-section').style.display = 'flex';
  document.getElementById('app-section').style.display = 'none';
}

// ============================================================
// INIT
// ============================================================
async function initApp() {
  const d = await api('GET', '/auth/profile');
  S.user = d.user;
  document.getElementById('header-name').textContent = S.user.firstName;
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('app-section').style.display = 'block';

  if (S.user.role === 'captain') {
    try {
      const td = await api('GET', '/teams');
      S.myTeam = (td.teams || []).find(t => t.captainId === S.user.id) || null;
    } catch(e) {}
  }

  try {
    const ld = await api('GET', '/leagues');
    outer: for (const l of ld.leagues || []) {
      const detail = await api('GET', `/leagues/${l.id}`);
      for (const div of (detail.league?.divisions || [])) {
        const active = (div.seasons || []).find(s => s.status === 'active');
        if (active) { S.activeSeasonId = active.id; break outer; }
      }
    }
  } catch(e) {}

  buildNav();
  navigate('wall');
  startNotifPolling();

  if (!S.user.isProfileComplete) {
    showOnboarding();
  }
}

function showOnboarding() {
  const bg = document.getElementById('onboarding-bg');
  bg.style.display = 'flex';
  if (S.user.profilePhotoUrl) {
    document.getElementById('ob-photo').value = S.user.profilePhotoUrl;
    previewAvatar(S.user.profilePhotoUrl);
  }
  if (S.user.username) document.getElementById('ob-username').value = S.user.username;
  if (S.user.padelLevel) document.getElementById('ob-level').value = S.user.padelLevel;
  if (S.user.preferredSide) document.getElementById('ob-side').value = S.user.preferredSide;
  if (S.user.yearsPlaying) document.getElementById('ob-years').value = S.user.yearsPlaying;
  if (S.user.preferredCourt) document.getElementById('ob-court').value = S.user.preferredCourt;
  if (S.user.phone) document.getElementById('ob-phone').value = S.user.phone;
  if (S.user.bio) document.getElementById('ob-bio').value = S.user.bio;
}

function previewAvatar(url) {
  const el = document.getElementById('ob-avatar-preview');
  if (url && url.startsWith('http')) {
    el.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='👤'">`;
  } else {
    el.innerHTML = '👤';
  }
}

async function saveOnboarding() {
  const err = document.getElementById('ob-err');
  err.style.display = 'none';
  const body = {
    username:       document.getElementById('ob-username').value.trim() || undefined,
    profilePhotoUrl: document.getElementById('ob-photo').value.trim() || undefined,
    padelLevel:     document.getElementById('ob-level').value || undefined,
    preferredSide:  document.getElementById('ob-side').value || undefined,
    yearsPlaying:   document.getElementById('ob-years').value || undefined,
    preferredCourt: document.getElementById('ob-court').value || undefined,
    phone:          document.getElementById('ob-phone').value.trim() || undefined,
    bio:            document.getElementById('ob-bio').value.trim() || undefined,
  };
  try {
    const d = await api('PUT', '/users/me', body);
    S.user = d.user;
    document.getElementById('onboarding-bg').style.display = 'none';
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

function skipOnboarding() {
  document.getElementById('onboarding-bg').style.display = 'none';
}

function buildNav() {
  const tabs = [
    { id: 'wall',     label: '🏠 Muro' },
    { id: 'matches',  label: '📅 Partidos' },
    { id: 'teams',    label: '🏓 Equipos' },
    { id: 'leagues',  label: '🏆 Ligas' },
    { id: 'stats',    label: '📊 Clasificación' },
    { id: 'profile',  label: '👤 Perfil' },
    ...(S.user.role === 'admin' ? [
      { id: 'users',    label: '👥 Usuarios' },
      { id: 'payments', label: '💳 Pagos' },
      { id: 'sponsors', label: '🎯 Patrocinadores' },
    ] : []),
  ];
  document.getElementById('main-nav').innerHTML = tabs.map(t =>
    `<button onclick="navigate('${t.id}')" id="nav-${t.id}">${t.label}</button>`
  ).join('');
}

function navigate(view) {
  S.currentView = view;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + view);
  if (btn) btn.classList.add('active');
  const views = { wall: loadWall, matches: loadMatches, teams: loadTeams, leagues: loadLeagues,
    stats: loadStats, profile: loadProfile, users: loadUsers, payments: loadPayments, sponsors: loadSponsors };
  if (views[view]) views[view]();
}

// ============================================================
// WALL
// ============================================================
async function loadWall() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:var(--muted)">Cargando...</p>';
  try {
    const [annData, spData] = await Promise.all([api('GET','/announcements'), api('GET','/sponsors')]);
    const posts = annData.announcements || [];
    const sponsors = spData.sponsors || [];

    let html = '<div class="page-title">Muro de la Liga</div>';

    if (sponsors.length) {
      html += '<div class="sponsors-bar">' + sponsors.map(s =>
        `<div class="sponsor-chip">${s.websiteUrl ? `<a href="${s.websiteUrl}" target="_blank">${esc(s.name)}</a>` : esc(s.name)}</div>`
      ).join('') + '</div>';
    }

    if (S.user.role === 'admin') {
      html += `<div class="card" style="margin-bottom:20px">
        <div class="card-title">Publicar Anuncio</div>
        <div class="form-group" style="margin-bottom:10px"><input id="ann-title" placeholder="Título del anuncio"></div>
        <div class="form-group" style="margin-bottom:12px"><textarea id="ann-content" rows="3" placeholder="Contenido del anuncio..."></textarea></div>
        <button class="btn btn-sm" onclick="postAnnouncement()">Publicar</button>
      </div>`;
    }

    if (!posts.length) {
      html += '<p style="color:var(--muted)">El muro está vacío de momento.</p>';
    } else {
      html += posts.map(p => {
        const cls = p.isPinned ? 'pinned' : p.type === 'system' ? 'system' : '';
        const pin = p.isPinned ? '📌 ' : '';
        const who = p.type === 'system' ? '🤖 Sistema' : (p.author ? `${p.author.firstName} ${p.author.lastName}` : 'Admin');
        const adminBtns = S.user.role === 'admin' ? `
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn-secondary btn-sm" onclick="togglePin(${p.id})">${p.isPinned ? 'Desanclar' : '📌 Anclar'}</button>
            <button class="btn-red btn-sm" onclick="deleteAnn(${p.id})">Borrar</button>
          </div>` : '';
        return `<div class="wall-post ${cls}">
          <h3>${pin}${esc(p.title)}</h3>
          <p>${esc(p.content)}</p>
          <div class="meta"><span>${who}</span><span>${fmtDate(p.createdAt)}</span>${adminBtns}</div>
        </div>`;
      }).join('');
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

async function postAnnouncement() {
  const title = document.getElementById('ann-title').value.trim();
  const content = document.getElementById('ann-content').value.trim();
  if (!title || !content) { alert('Completa título y contenido'); return; }
  try { await api('POST', '/announcements', { title, content }); loadWall(); }
  catch(e) { alert(e.message); }
}
async function togglePin(id) {
  try { await api('PUT', `/announcements/${id}/pin`, {}); loadWall(); } catch(e) { alert(e.message); }
}
async function deleteAnn(id) {
  if (!confirm('¿Borrar este anuncio?')) return;
  try { await api('DELETE', `/announcements/${id}`); loadWall(); } catch(e) { alert(e.message); }
}

// ============================================================
// MATCHES
// ============================================================
async function loadMatches() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:var(--muted)">Cargando partidos...</p>';

  if (!S.calendarMonth) {
    const n = new Date();
    S.calendarMonth = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  }

  try {
    let url = '/matches';
    if (S.user.role === 'captain' && S.myTeam) url += `?teamId=${S.myTeam.id}`;

    const d = await api('GET', url);
    const matches = d.matches || [];

    const year = parseInt(S.calendarMonth.split('-')[0]);
    const month = parseInt(S.calendarMonth.split('-')[1]);
    const prevM = month === 1 ? `${year-1}-12` : `${year}-${String(month-1).padStart(2,'0')}`;
    const nextM = month === 12 ? `${year+1}-01` : `${year}-${String(month+1).padStart(2,'0')}`;
    const monthLabel = new Date(year, month-1, 1).toLocaleDateString('es-ES', { month:'long', year:'numeric' });

    // Group by week
    const byWeek = {};
    for (const m of matches) {
      const w = m.weekNumber;
      if (!byWeek[w]) byWeek[w] = [];
      byWeek[w].push(m);
    }
    const weeks = Object.keys(byWeek).sort((a,b)=>+a - +b);

    let html = `<div class="page-title">Calendario de Partidos</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <button class="btn-secondary btn-sm" onclick="changeCalMonth('${prevM}')">‹ Anterior</button>
      <span style="font-size:15px;font-weight:600;text-transform:capitalize">${monthLabel}</span>
      <button class="btn-secondary btn-sm" onclick="changeCalMonth('${nextM}')">Siguiente ›</button>
    </div>`;

    if (!weeks.length) {
      html += '<p style="color:var(--muted)">No hay partidos para mostrar. Todos los partidos están disponibles arriba.</p>';
      // Show all matches
      if (matches.length) {
        html += '<div class="card"><div class="card-title">Todos los partidos</div><div class="table-wrap"><table><thead><tr><th>J</th><th>Local</th><th>Visitante</th><th>Estado</th><th></th></tr></thead><tbody>';
        for (const m of matches.sort((a,b)=>a.weekNumber-b.weekNumber)) {
          html += `<tr class="clickable" onclick="openMatchDetail(${m.id})">
            <td>${m.weekNumber}</td>
            <td><b>${esc(m.homeTeam?.name)}</b></td>
            <td><b>${esc(m.awayTeam?.name)}</b></td>
            <td><span class="status status-${m.status}">${statusLabel(m.status)}</span></td>
            <td><button class="btn btn-sm" onclick="event.stopPropagation();openMatchDetail(${m.id})">Ver</button></td>
          </tr>`;
        }
        html += '</tbody></table></div></div>';
      }
    } else {
      for (const w of weeks) {
        html += `<div class="week-block"><h3>Jornada ${w}</h3>
        <div class="table-wrap"><table>
        <thead><tr><th>Local</th><th>Visitante</th><th>Fecha</th><th>Estado</th><th></th></tr></thead><tbody>`;
        for (const m of byWeek[w]) {
          html += `<tr class="clickable" onclick="openMatchDetail(${m.id})">
            <td><b>${esc(m.homeTeam?.name)}</b></td>
            <td><b>${esc(m.awayTeam?.name)}</b></td>
            <td>${m.matchDate ? fmtDate(m.matchDate) : '—'}</td>
            <td><span class="status status-${m.status}">${statusLabel(m.status)}</span></td>
            <td><button class="btn btn-sm" onclick="event.stopPropagation();openMatchDetail(${m.id})">Ver</button></td>
          </tr>`;
        }
        html += '</tbody></table></div></div>';
      }
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

function changeCalMonth(m) { S.calendarMonth = m; loadMatches(); }

// MATCH DETAIL MODAL
// ============================================================
async function openMatchDetail(id) {
  currentMatchId = id;
  document.getElementById('match-modal-bg').classList.add('open');
  await renderMatchModal(id, 'info');
}

function closeMatchModal() {
  document.getElementById('match-modal-bg').classList.remove('open');
  if (chatPollRef) { clearInterval(chatPollRef); chatPollRef = null; }
  currentMatchId = null;
}

async function renderMatchModal(id, activeTab) {
  const modal = document.getElementById('match-modal-body');
  modal.innerHTML = '<p style="color:var(--muted)">Cargando...</p>';
  try {
    const d = await api('GET', `/matches/${id}`);
    const m = d.match;
    document.getElementById('match-modal-title').textContent =
      `${m.homeTeam?.name} vs ${m.awayTeam?.name}`;

    const isHomeCap = S.user.role === 'captain' && S.myTeam?.id === m.homeTeamId;
    const isAwayCap = S.user.role === 'captain' && S.myTeam?.id === m.awayTeamId;
    const isMyCap = isHomeCap || isAwayCap;
    const isAdmin = S.user.role === 'admin';

    const proposals = m.proposals || [];
    const activeProposal = proposals.find(p => p.status === 'pending');
    const canAccept = activeProposal && isMyCap && activeProposal.proposingTeamId !== S.myTeam?.id;
    const canPropose = isMyCap && ['pending_proposal','proposed'].includes(m.status);
    const canConfirm = (isMyCap || isAdmin) && ['scheduled','in_progress'].includes(m.status);
    const canDispute = isMyCap && ['scheduled','completed'].includes(m.status);
    const canVote = isMyCap && m.status === 'completed';

    const TABS = [
      { id:'info',       label:'ℹ️ Info' },
      { id:'propuestas', label:'📅 Propuestas' },
      { id:'chat',       label:'💬 Chat' },
      { id:'disputa',    label:'⚠️ Disputa' },
      { id:'mvp',        label:'🏅 MVP' },
    ];

    let html = `<div class="tab-bar">` +
      TABS.map(t => `<button onclick="renderMatchModal(${id},'${t.id}')" class="${activeTab===t.id?'active':''}">${t.label}</button>`).join('') +
      `</div>`;

    // ---- INFO ----
    if (activeTab === 'info') {
      html += `<div class="grid-2" style="margin-bottom:16px">
        <div class="stat-card"><div class="lbl">Estado</div><div class="val" style="font-size:14px"><span class="status status-${m.status}">${statusLabel(m.status)}</span></div></div>
        <div class="stat-card"><div class="lbl">Jornada</div><div class="val">${m.weekNumber}</div></div>
        <div class="stat-card"><div class="lbl">Fecha</div><div class="val" style="font-size:13px">${m.matchDate ? fmtDate(m.matchDate) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">Lugar</div><div class="val" style="font-size:13px">${m.location ? esc(m.location) : '—'}</div></div>
      </div>`;

      if (m.results?.length) {
        html += `<div class="card-title">Resultado</div>
        <div class="table-wrap" style="margin-bottom:16px"><table>
          <thead><tr><th>Set</th><th>${esc(m.homeTeam?.name)}</th><th>${esc(m.awayTeam?.name)}</th></tr></thead>
          <tbody>` + m.results.map(r => `<tr>
            <td>Set ${r.setNumber||'?'}</td><td><b>${r.homeScore}</b></td><td><b>${r.awayScore}</b></td>
          </tr>`).join('') + `</tbody></table></div>`;
      }

      if (canConfirm) {
        const myConf = (isHomeCap && m.homeTeamConfirmed) || (isAwayCap && m.awayTeamConfirmed);
        html += `<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">`;
        if (isAdmin) {
          html += `<button class="btn-green btn" onclick="doConfirmMatch(${id})">✓ Confirmar ambos lados</button>`;
        } else if (!myConf) {
          html += `<button class="btn-green btn" onclick="doConfirmMatch(${id})">✓ Confirmar mi equipo</button>`;
        } else {
          html += `<span style="color:var(--green)">✓ Tu equipo confirmó</span>`;
        }
        html += `<span style="font-size:12px;color:var(--muted)">${esc(m.homeTeam?.name)}: ${m.homeTeamConfirmed?'✓':'—'} | ${esc(m.awayTeam?.name)}: ${m.awayTeamConfirmed?'✓':'—'}</span>
        </div>`;
      }

      if (m.status === 'pending_proposal' && canPropose) {
        html += `<p style="color:var(--accent);font-size:13px">📅 Este partido aún no tiene fecha. Ve a <b>Propuestas</b> para proponer una.</p>`;
      }

      if (canDispute && m.status !== 'disputed') {
        html += `<div style="margin-top:4px"><button class="btn-orange btn btn-sm" onclick="renderMatchModal(${id},'disputa')">⚠️ Abrir Disputa</button></div>`;
      }

    // ---- PROPUESTAS ----
    } else if (activeTab === 'propuestas') {
      if (canPropose) {
        html += `<div class="card" style="margin-bottom:16px">
          <div class="card-title">${activeProposal ? 'Contra-proponer fecha' : 'Proponer fecha y lugar'}</div>
          <div class="form-group" style="margin-bottom:10px"><label>Fecha y hora</label><input type="datetime-local" id="prop-date"></div>
          <div class="form-group" style="margin-bottom:10px"><label>Lugar</label><input id="prop-loc" placeholder="Club / pista / dirección"></div>
          <div class="form-group" style="margin-bottom:12px"><label>Mensaje (opcional)</label><textarea id="prop-msg" rows="2" placeholder="Comentario..."></textarea></div>
          <button class="btn btn-sm" onclick="sendProposal(${id})">Enviar propuesta</button>
        </div>`;
      }

      if (canAccept && activeProposal) {
        html += `<div class="card" style="border-color:var(--accent);background:rgba(79,142,247,.06);margin-bottom:16px">
          <div class="card-title" style="color:var(--accent)">Propuesta pendiente de tu respuesta</div>
          <p style="font-size:14px;line-height:1.7;margin-bottom:12px">
            <b>${esc(activeProposal.proposingTeam?.name)}</b> propone:<br>
            📅 ${fmtDate(activeProposal.proposedDate)}<br>
            ${activeProposal.location ? `📍 ${esc(activeProposal.location)}<br>` : ''}
            ${activeProposal.message ? `💬 ${esc(activeProposal.message)}` : ''}
          </p>
          <div style="display:flex;gap:8px">
            <button class="btn-green btn btn-sm" onclick="respondProposal(${id},${activeProposal.id},'accept')">✓ Aceptar</button>
            <button class="btn-red btn btn-sm" onclick="respondProposal(${id},${activeProposal.id},'reject')">✕ Rechazar</button>
          </div>
        </div>`;
      }

      const history = proposals.filter(p => p.id !== activeProposal?.id);
      if (history.length) {
        html += `<div class="card-title">Historial</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Equipo</th><th>Fecha</th><th>Lugar</th><th>Estado</th></tr></thead>
          <tbody>` + history.map(p => `<tr>
            <td>${esc(p.proposingTeam?.name)}</td>
            <td>${fmtDate(p.proposedDate)}</td>
            <td>${p.location ? esc(p.location) : '—'}</td>
            <td><span class="status status-${p.status}">${statusLabel(p.status)}</span></td>
          </tr>`).join('') + `</tbody></table></div>`;
      } else if (!canPropose && !canAccept) {
        html += `<p style="color:var(--muted)">No hay propuestas registradas.</p>`;
      }

    // ---- CHAT ----
    } else if (activeTab === 'chat') {
      html += `<div id="chat-messages" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="chat-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendChatMsg(${id})">
          <button class="btn btn-sm" onclick="sendChatMsg(${id})">Enviar</button>
        </div>`;
      modal.innerHTML = html;
      await loadChatMessages(id);
      if (chatPollRef) clearInterval(chatPollRef);
      chatPollRef = setInterval(() => { if (currentMatchId === id) loadChatMessages(id); }, 5000);
      return;

    // ---- DISPUTA ----
    } else if (activeTab === 'disputa') {
      try {
        const dd = await api('GET', `/matches/${id}/dispute`);
        const dispute = dd.dispute;
        if (dispute) {
          const color = dispute.status === 'open' ? 'red' : 'green';
          html += `<div class="card" style="border-color:var(--${color})">
            <div class="card-title">Disputa ${dispute.status === 'open' ? 'Abierta' : 'Resuelta'}</div>
            <p style="margin-bottom:8px"><b>Motivo:</b> ${esc(dispute.reason)}</p>
            <p style="font-size:12px;color:var(--muted)">Abierta por ${dispute.raisedByUser?.firstName} ${dispute.raisedByUser?.lastName} el ${fmtDate(dispute.createdAt)}</p>
            ${dispute.resolution ? `<p style="margin-top:10px"><b>Resolución:</b> ${esc(dispute.resolution)}</p>` : ''}
          </div>`;
          if (dispute.status === 'open' && isAdmin) {
            html += `<div class="card" style="margin-top:12px">
              <div class="card-title">Resolver</div>
              <div class="form-group" style="margin-bottom:12px"><textarea id="disp-res" rows="3" placeholder="Describe la resolución..."></textarea></div>
              <div style="display:flex;gap:8px">
                <button class="btn-green btn btn-sm" onclick="resolveDispute(${dispute.id},'completed')">Marcar completado</button>
                <button class="btn-orange btn btn-sm" onclick="resolveDispute(${dispute.id},'scheduled')">Repetir partido</button>
              </div>
            </div>`;
          }
        } else if (canDispute) {
          html += `<div class="card">
            <div class="card-title">Abrir una disputa</div>
            <div class="form-group" style="margin-bottom:12px"><textarea id="disp-reason" rows="3" placeholder="Describe el motivo de la disputa..."></textarea></div>
            <button class="btn-red btn btn-sm" onclick="doOpenDispute(${id})">Abrir disputa</button>
          </div>`;
        } else {
          html += `<p style="color:var(--muted)">No hay disputas para este partido.</p>`;
        }
      } catch(e) { html += `<p style="color:var(--red)">${e.message}</p>`; }

    // ---- MVP ----
    } else if (activeTab === 'mvp') {
      if (m.status !== 'completed') {
        html += `<p style="color:var(--muted)">El partido debe estar completado para votar.</p>`;
      } else {
        try {
          const [votedRes, mvpRes] = await Promise.all([
            canVote ? api('GET', `/matches/${id}/mvp/voted`) : Promise.resolve({ voted: true }),
            api('GET', `/matches/${id}/mvp`),
          ]);
          const { votes, tally } = mvpRes;

          if (tally?.length) {
            html += `<div class="card" style="margin-bottom:16px">
              <div class="card-title">Votos MVP</div>`;
            tally.forEach((t, i) => {
              html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 0">
                <span class="rank-num">${i+1}</span>
                <span><b>${t.user?.firstName} ${t.user?.lastName}</b></span>
                <span style="color:var(--muted)">${t.votes} voto${t.votes!==1?'s':''}</span>
              </div>`;
            });
            html += `</div>`;
          }

          if (!votedRes.voted && canVote) {
            const oppTeamId = isHomeCap ? m.awayTeamId : m.homeTeamId;
            const oppName = isHomeCap ? m.awayTeam?.name : m.homeTeam?.name;
            try {
              const oppData = await api('GET', `/teams/${oppTeamId}`);
              const players = (oppData.team?.players || []).map(tp => tp.user).filter(Boolean);
              html += `<div class="card">
                <div class="card-title">Vota el MVP de ${esc(oppName)}</div>
                <div class="form-group" style="margin-bottom:12px">
                  <label>Mejor jugador rival</label>
                  <select id="mvp-sel">
                    <option value="">Selecciona jugador...</option>
                    ${players.map(p => `<option value="${p.id}">${esc(p.firstName)} ${esc(p.lastName)}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:16px">
                  <label>Fair Play de ${esc(oppName)} (1-5 ★)</label>
                  <div class="star-rating" id="star-row">
                    ${[1,2,3,4,5].map(n=>`<span data-v="${n}" onclick="setStars(${n})" class="${n<=3?'lit':''}"">★</span>`).join('')}
                  </div>
                  <input type="hidden" id="fp-val" value="3">
                </div>
                <button class="btn btn-sm" onclick="doCastVote(${id},${oppTeamId})">Enviar voto</button>
              </div>`;
            } catch(e) { html += `<p style="color:var(--red)">Error cargando equipo rival: ${e.message}</p>`; }
          } else if (votedRes.voted && isMyCap) {
            html += `<p style="color:var(--green);margin-top:8px">✓ Ya has votado en este partido.</p>`;
          } else if (!isMyCap && !isAdmin) {
            html += `<p style="color:var(--muted)">Solo los capitanes pueden votar el MVP.</p>`;
          }
        } catch(e) { html += `<p style="color:var(--red)">${e.message}</p>`; }
      }
    }

    modal.innerHTML = html;
  } catch(e) { modal.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

async function loadChatMessages(matchId) {
  const box = document.getElementById('chat-messages');
  if (!box) return;
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
  try {
    const d = await api('GET', `/matches/${matchId}/messages`);
    box.innerHTML = (d.messages || []).map(msg => {
      const mine = msg.userId === S.user.id;
      return `<div class="chat-msg ${mine?'mine':'theirs'}">
        <div class="chat-meta">${mine?'Tú':esc(msg.author?.firstName)} · ${fmtTime(msg.createdAt)}</div>
        <div class="bubble">${esc(msg.content)}</div>
      </div>`;
    }).join('');
    if (atBottom) box.scrollTop = box.scrollHeight;
  } catch(e) {}
}

async function sendChatMsg(matchId) {
  const inp = document.getElementById('chat-input');
  if (!inp?.value.trim()) return;
  try {
    await api('POST', `/matches/${matchId}/messages`, { content: inp.value.trim() });
    inp.value = '';
    await loadChatMessages(matchId);
    const box = document.getElementById('chat-messages');
    if (box) box.scrollTop = box.scrollHeight;
  } catch(e) { alert(e.message); }
}

async function sendProposal(matchId) {
  const date = document.getElementById('prop-date').value;
  const location = document.getElementById('prop-loc').value;
  const message = document.getElementById('prop-msg').value;
  if (!date) { alert('Selecciona fecha y hora'); return; }
  try {
    await api('POST', `/matches/${matchId}/proposals`, { proposedDate: date, location, message });
    await renderMatchModal(matchId, 'propuestas');

  } catch(e) { alert(e.message); }
}

async function respondProposal(matchId, proposalId, action) {

async function doOpenDispute(matchId) {

  try {

// STATS
// ============================================================
async function loadStats() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:var(--muted)">Cargando clasificación...</p>';
  if (!S.activeSeasonId) {
    el.innerHTML = '<p style="color:var(--muted)">No se encontró temporada activa.</p>';
    return;
  }
  try {
    const [standData, myStatData, myAchData, allAchData] = await Promise.all([
      api('GET', `/stats/standings/${S.activeSeasonId}`),
      api('GET', `/stats/me?seasonId=${S.activeSeasonId}`),
      api('GET', '/achievements/mine'),
      api('GET', '/achievements'),
    ]);

    const standings = standData.standings || [];
    const mySt = (myStatData.stats || [])[0];
    const myAchs = new Set((myAchData.achievements||[]).map(a => a.achievement?.slug));
    const allAchs = allAchData.achievements || [];

    let html = `<div class="page-title">Clasificación ELO - Temporada Activa</div>`;

    if (mySt) {
      html += `<div class="grid-4" style="margin-bottom:24px">
        <div class="stat-card"><div class="lbl">Mi ELO</div><div class="val" style="color:var(--accent)">${mySt.elo}</div></div>
        <div class="stat-card"><div class="lbl">Victorias</div><div class="val" style="color:var(--green)">${mySt.wins}</div></div>
        <div class="stat-card"><div class="lbl">Derrotas</div><div class="val" style="color:var(--red)">${mySt.losses}</div></div>
        <div class="stat-card"><div class="lbl">Fair Play</div><div class="val" style="color:var(--yellow)">${mySt.fairPlayVotes > 0 ? Number(mySt.fairPlayAvg).toFixed(1) : '—'}</div></div>
      </div>`;
    } else {
      html += `<p style="color:var(--muted);margin-bottom:16px">Juega tu primer partido para aparecer en la clasificación.</p>`;
    }

    if (standings.length) {
      html += `<div class="card" style="margin-bottom:24px">
        <div class="card-title">Clasificación General</div>
        <div class="table-wrap"><table>
          <thead><tr><th>#</th><th>Jugador</th><th>ELO</th><th>PJ</th><th>V</th><th>D</th><th>Racha</th><th>MVP</th><th>FP</th></tr></thead>
          <tbody>`;
      standings.forEach((s,i) => {
        const isMe = s.userId === S.user.id;
        html += `<tr onclick="showUserDetail(${s.userId})" class="clickable" ${isMe?'style="background:rgba(79,142,247,.1)"':''}>
          <td><span class="rank-num">${i+1}</span></td>
          <td><b>${esc(s.user?.firstName)} ${esc(s.user?.lastName)}</b>${isMe?' (tú)':''}</td>
          <td style="color:var(--accent);font-weight:700">${s.elo}</td>
          <td>${s.matchesPlayed}</td>
          <td style="color:var(--green);font-weight:600">${s.wins}</td>
          <td style="color:var(--red)">${s.losses}</td>
          <td>🔥${s.winStreak}</td>
          <td>🏅${s.mvpCount}</td>
          <td>${s.fairPlayVotes > 0 ? `⭐${Number(s.fairPlayAvg).toFixed(1)}` : '—'}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    }

    // Achievements
    html += `<div class="page-title" style="margin-top:8px">Logros</div>
    <div class="ach-grid">`;
    for (const a of allAchs) {
      const have = myAchs.has(a.slug);
      html += `<div class="ach-badge ${have?'':'ach-locked'}" title="${esc(a.description)}">
        <span class="icon">${a.icon||'🏅'}</span>
        <div><div style="font-weight:600">${esc(a.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(a.description)}</div></div>
      </div>`;
    }
    html += `</div>`;
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

      for (const ua of achs) {
        const a = ua.achievement;
        html += `<div class="ach-badge"><span class="icon">${a?.icon||'🏅'}</span><div>${esc(a?.name)}</div></div>`;
      }
      html += `</div></div>`;
    }

    document.getElementById('detail-modal-title').textContent = `${u.firstName} ${u.lastName}`;
    document.getElementById('detail-modal-body').innerHTML = html;
  } catch(e) { document.getElementById('detail-modal-body').innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

async function reviewCap(id, action) {
  try {
    await api('POST', `/captain-requests/${id}/${action}`, {});
    closeDetailModal();
    loadUsers();
    refreshNotifBadge();
  } catch(e) { alert(e.message); }
}

// ============================================================
// PAYMENTS (Admin)
// ============================================================
async function loadPayments() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:var(--muted)">Cargando...</p>';
  if (!S.activeSeasonId) { el.innerHTML = '<p style="color:var(--muted)">Sin temporada activa.</p>'; return; }
  try {
    const d = await api('GET', `/payments?seasonId=${S.activeSeasonId}`);
    const payments = d.payments || [];
    const sum = { paid: 0, pending: 0, overdue: 0 };
    for (const p of payments) sum[p.status] = (sum[p.status]||0) + 1;

    let html = `<div class="page-title">Gestión de Pagos</div>
    <div class="grid-3" style="margin-bottom:20px">
      <div class="stat-card"><div class="lbl">Pagados</div><div class="val" style="color:var(--green)">${sum.paid}</div></div>
      <div class="stat-card"><div class="lbl">Pendientes</div><div class="val" style="color:var(--orange)">${sum.pending}</div></div>
      <div class="stat-card"><div class="lbl">Morosos</div><div class="val" style="color:var(--red)">${sum.overdue}</div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Equipo</th><th>Importe</th><th>Estado</th><th>Fecha pago</th><th>Acciones</th></tr></thead>
      <tbody>`;
    for (const p of payments) {
      html += `<tr>
        <td><b>${esc(p.team?.name)}</b></td>
        <td>€${Number(p.amount).toFixed(2)}</td>
        <td><span class="status status-${p.status}">${statusLabel(p.status)}</span></td>
        <td>${p.paidAt ? fmtDate(p.paidAt) : '—'}</td>
        <td><div style="display:flex;gap:6px">
          <button class="btn-green btn btn-sm" onclick="setPayStatus(${p.teamId},${p.seasonId},'paid')">Pagado</button>
          <button class="btn-orange btn btn-sm" onclick="setPayStatus(${p.teamId},${p.seasonId},'overdue')">Moroso</button>
          <button class="btn-secondary btn-sm" onclick="setPayStatus(${p.teamId},${p.seasonId},'pending')">Pendiente</button>
        </div></td>
      </tr>`;
    }
    html += '</tbody></table></div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

async function setPayStatus(teamId, seasonId, status) {
  try { await api('POST', `/payments/${teamId}/season/${seasonId}/${status}`, {}); loadPayments(); }
  catch(e) { alert(e.message); }
}

// ============================================================
// SPONSORS (Admin)
// ============================================================
async function loadSponsors() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:var(--muted)">Cargando...</p>';
  try {
    const d = await api('GET', '/sponsors/all');
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="page-title" style="margin:0">Patrocinadores</div>
      <button class="btn btn-sm" onclick="showAddSponsor()">+ Añadir</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nombre</th><th>Slot</th><th>Web</th><th>Activo</th><th></th></tr></thead>
      <tbody>`;
    for (const s of d.sponsors||[]) {
      html += `<tr>
        <td><b>${esc(s.name)}</b></td>
        <td>${s.slot||'—'}</td>
        <td>${s.websiteUrl ? `<a href="${s.websiteUrl}" target="_blank">Link ↗</a>` : '—'}</td>
        <td>${s.isActive ? '✅ Activo' : '❌ Inactivo'}</td>
        <td>${s.isActive ? `<button class="btn-red btn btn-sm" onclick="deactivateSponsor(${s.id})">Desactivar</button>` : ''}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
}

function showAddSponsor() {
  openDetail('Nuevo Patrocinador', `
    <div class="form-group"><label>Nombre</label><input id="sp-name" placeholder="Nombre del patrocinador"></div>
    <div class="form-group"><label>Web</label><input id="sp-web" placeholder="https://..."></div>
    <div class="form-group" style="margin-bottom:16px"><label>Slot (banner/sidebar)</label><input id="sp-slot" placeholder="banner"></div>
    <button class="btn" onclick="doCreateSponsor()">Guardar</button>
  `);
}

async function doCreateSponsor() {
  const name = document.getElementById('sp-name').value.trim();
  const websiteUrl = document.getElementById('sp-web').value.trim();
  const slot = document.getElementById('sp-slot').value.trim();
  if (!name) { alert('El nombre es obligatorio'); return; }
  try { await api('POST', '/sponsors', { name, websiteUrl, slot }); closeDetailModal(); loadSponsors(); }
  catch(e) { alert(e.message); }
}

async function deactivateSponsor(id) {
  if (!confirm('¿Desactivar este patrocinador?')) return;
  try { await api('DELETE', `/sponsors/${id}`); loadSponsors(); } catch(e) { alert(e.message); }
}

// ============================================================
// NOTIFICATIONS
// ============================================================
function toggleNotifPanel(e) {
  e.stopPropagation();
  const panel = document.getElementById('notif-panel');
  const wasOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  if (!wasOpen) {
    refreshNotifications();
    setTimeout(() => document.addEventListener('click', closeNotifOutside, { once: true }), 0);
  }
}

function closeNotifOutside(e) {
  const panel = document.getElementById('notif-panel');
  if (!panel.contains(e.target)) panel.classList.remove('open');
}

function startNotifPolling() {
  refreshNotifBadge();
  notifPollRef = setInterval(refreshNotifBadge, 30000);
}

async function refreshNotifBadge() {
  try {
    const d = await api('GET', '/notifications/count');
    const badge = document.getElementById('notif-badge');
    if (d.count > 0) { badge.textContent = d.count; badge.style.display = 'flex'; }
    else { badge.style.display = 'none'; }
  } catch(e) {}
}

async function refreshNotifications() {
  const content = document.getElementById('notif-content');
  try {
    const d = await api('GET', '/notifications');
    let html = '';

    if (d.type === 'admin') {
      for (const cr of d.captainRequests||[]) {
        html += `<div class="notif-item">
          <div class="notif-title">Solicitud de capitán</div>
          <div class="notif-sub">${cr.user?.firstName} ${cr.user?.lastName} — ${cr.user?.email}</div>
          <div class="notif-actions">
            <button class="btn-green btn btn-sm" onclick="reviewCap(${cr.id},'approved');refreshNotifBadge()">✓ Aprobar</button>
            <button class="btn-red btn btn-sm" onclick="reviewCap(${cr.id},'rejected');refreshNotifBadge()">✕ Rechazar</button>
          </div>
        </div>`;
      }
      for (const dis of d.disputes||[]) {
        html += `<div class="notif-item">
          <div class="notif-title">⚠️ Disputa abierta</div>
          <div class="notif-sub">${dis.match?.homeTeam?.name} vs ${dis.match?.awayTeam?.name}</div>
          <div class="notif-sub">${dis.raisedByUser?.firstName}: ${(dis.reason||'').substring(0,60)}</div>
          <div class="notif-actions">
            <button class="btn btn-sm" onclick="openMatchDetail(${dis.matchId});document.getElementById('notif-panel').classList.remove('open')">Ver partido</button>
          </div>
        </div>`;
      }
    } else if (d.type === 'captain') {
      for (const mr of d.matchRequests||[]) {
        html += `<div class="notif-item">
          <div class="notif-title">Solicitud de partido</div>
          <div class="notif-sub">De: ${mr.requestingTeam?.name}</div>
          <div class="notif-actions">
            <button class="btn-green btn btn-sm" onclick="acceptMR(${mr.id})">✓ Aceptar</button>
            <button class="btn-red btn btn-sm" onclick="rejectMR(${mr.id})">✕ Rechazar</button>
          </div>
        </div>`;
      }
      for (const p of d.proposals||[]) {
        html += `<div class="notif-item">
          <div class="notif-title">📅 Propuesta de fecha</div>
          <div class="notif-sub">${fmtDate(p.proposedDate)} ${p.location ? '· ' + p.location : ''}</div>
          <div class="notif-actions">
            <button class="btn btn-sm" onclick="openMatchDetail(${p.matchId});document.getElementById('notif-panel').classList.remove('open')">Responder</button>
          </div>
        </div>`;
      }
    } else {
      const cr = d.captainRequests?.[0];
      if (cr) {
        html += `<div class="notif-item">
          <div class="notif-title">Solicitud de capitán</div>
          <div class="notif-sub">Estado: <span class="status status-${cr.status}">${statusLabel(cr.status)}</span></div>
        </div>`;
      }
    }

    content.innerHTML = html || '<div class="notif-item" style="color:var(--muted)">Sin notificaciones pendientes</div>';
  } catch(e) { content.innerHTML = `<div class="notif-item" style="color:var(--red)">${e.message}</div>`; }
}

async function acceptMR(id) {
  try {
    await api('POST', `/match-requests/${id}/accept`, {});
    refreshNotifications();
    refreshNotifBadge();
    if (S.currentView === 'matches') loadMatches();
  } catch(e) { alert(e.message); }
}

async function rejectMR(id) {
  try {
    await api('POST', `/match-requests/${id}/reject`, {});
    refreshNotifications();
    refreshNotifBadge();
  } catch(e) { alert(e.message); }
}

// ============================================================
// MODALS
// ============================================================
function openDetail(title, html) {
  document.getElementById('detail-modal-title').textContent = title;
  document.getElementById('detail-modal-body').innerHTML = html;
  document.getElementById('detail-modal-bg').classList.add('open');
}
function closeDetailModal() {
  document.getElementById('detail-modal-bg').classList.remove('open');
}

// ============================================================
// HELPERS
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
}
function statusLabel(s) {
  return ({
    pending_proposal:'Sin fecha', proposed:'Propuesta enviada', scheduled:'Programado',
    in_progress:'En curso', completed:'Completado', cancelled:'Cancelado', disputed:'En disputa',
    pending:'Pendiente', accepted:'Aceptada', rejected:'Rechazada', countered:'Contra-propuesta',
    open:'Abierta', resolved:'Resuelta', paid:'Pagado', overdue:'Moroso',
    player:'Jugador', captain:'Capitán', admin:'Admin', active:'Activa', inactive:'Inactiva',
  })[s] || s;
}

if (S.token) {
  initApp().catch(() => {
    document.getElementById('auth-section').style.display = 'flex';
  });
} else {
  document.getElementById('auth-section').style.display = 'flex';
}
