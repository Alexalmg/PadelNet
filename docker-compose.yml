services:
  postgres:
    image: postgres:15-alpine
    container_name: padelnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: padelnet_user
      POSTGRES_PASSWORD: padelnet
      POSTGRES_DB: padelnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padelnet_user -d padelnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: padelnet-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: padelnet
      DB_USER: padelnet_user
      DB_PASSWORD: padelnet
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-prod
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost,http://localhost:80
      ACTIVITY_CHECK_CRON: "0 0 * * 0"
      ACTIVITY_PENALTY_POINTS: 3
      ACTIVITY_MAX_INFRACTIONS: 3
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: padelnet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
